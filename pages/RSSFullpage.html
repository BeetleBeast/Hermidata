<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hermidata — RSS / Library</title>
<link rel="stylesheet" href="../assets/styles/styles.css">
<link rel="stylesheet" href="../assets/styles/RSSFullPage.css">
<link rel="stylesheet" href="../assets/styles/RSSPageStyles.css" />
</head>
<body>

  <section class="topbar">
    <h1>Hermidata — RSS & Library</h1>
    <div class="toolbar">
      <button type="button" id="bulkEditButton" class="Btn">bulk edit selected</button>
      <button type="button" id="mergeTwoHermidatas" class="Btn">merge two hermidatas</button>
      <button type="button" id="bulkOpen" class="Btn">Open selected</button>
      <button type="button" id="reloadData" class="Btn">Reload</button>
    </div>
  </section>

<section class="fullpage-RSS">
  <section class="left-container">
    <section class="search-container">
      <input id="search" placeholder="Search titles / tags..." />
    </section>
    <section class="all-entries-container"><!-- Dynamic load items--></section>
  </section>

  <section class="entry-details-container">
    <h3>Details</h3>
    <button type="button" id="closeDetail">Close</button>
    <section class="entry-details-mainContent">
    <!-- Title -->
    <label for="detail-title" id="detail-title-label">Title</label>
    <input type="text" id="detail-title" class="detail-input" />
    <br>
    <!-- Novel Type -->
    <label for="detail-novelType" id="detail-novelType-label">Novel Type</label>
    <select id="detail-novelType" class="detail-input"></select>
    <br>
    <!-- Novel Status -->
    <label for="detail-novelStatus" id="detail-novelStatus-label">Novel Status</label>
    <select id="detail-novelStatus" class="detail-input"></select>
    <br>
    <label for="detail-latestChapter" id="detail-latestChapter-label">Latest Chapter</label>
    <input type="number" id="detail-latestChapter" class="detail-input" />
    <br>
    <!-- Tags -->
    <div id="detail-tags-label">Tags</div>
    <div id="detail-tags-container"><!-- Dynamic load items--></div>
    <!-- alt Sources -->
    <div id="detail-altSources-label">Alt Sources</div>
    <div id="detail-altSources-container"><!-- Dynamic load items--></div>
    <!-- alt titles -->
    <div id="detail-altTitles-label">Alt Titles</div>
    <div id="detail-altTitles-container"><!-- Dynamic load items--></div>
    <!-- Notes -->
    <label for="detail-notes" id="detail-notes-label" >Notes</label>
    <textarea id="detail-notes" class="detail-input"></textarea>
    <br>
  </section>
  <section class="entry-details-bookmarks"><!-- Dynamic load items--></section>
  <button type="button" id="saveDetail">Save</button>
  </section>
  <section id="bulkEditPanel" data-open="false" >
    <h3>Bulk Edit</h3>
    <label for="bulkEditType">Novel Type:</label>
    <select id="bulkEditType"></select>
    <br>
    <label for="bulkEditStatus">Novel Status:</label>
    <select id="bulkEditStatus"></select>
    <br>
    <label for="bulkEditTags">Tags</label>
    <div type="text" id="bulkEditTags"></div>
    <br>
    <div id="bulkEditButtons">
      <button type="button" id="saveBulkEditButton">Save Changes</button>
      <button type="button" class="CancelBulkEditButton">Cancel</button>
    </div>
  </section>

</section>



<script src="../scripts/rssPage/main.ts" type="module"></script>
</body>
</html>
