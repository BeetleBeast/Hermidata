<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermidata</title>
    <link rel="stylesheet" href="../assets/styles/styles.css">
    <link rel="stylesheet" href="../assets/styles/Classic.css">
    <link rel="stylesheet" href="../assets/styles/RSSFeed.css">
</head>
<body>
    <div id="header" class="HDSwitcher">
        <button id="HDClassicBtn" type="button" class="active Btn">Classic</button>
        <button id="HDRSSBtn" type="button" class="Btn">RSS</button>
    </div>
<section id="body" class="HDClassic">
    <section class="main">
        <div class="topMain">
            <input id="title" class="autoInput" data-name="Title" type="text" spellcheck="false" placeholder="Title" />
            <button class="openSettings" type="button" >
                <img alt="0" class="icon" class="imgSettings" src='../assets/icon/settings_24.png'/>
            </button>
        </div>
        <div class="table-2-container">
            <table class="table-2">
                <thead>
                    <tr>
                    <th class="HEADER">Chapter</th>
                    <th class="HEADER">Type</th>
                    <th class="HEADER">Read Status</th>
                    <th class="HEADER">Novel Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><div class="chapter-container">
                                <p id="previousChapter" class="autoInput" data-name="PreviousChapter" type="number"></p>
                                <span id="chapterArrow">=></span>
                                <input id="chapter" class="autoInput" data-name="Chapter" type="number" placeholder="Chapter"/>
                        </td></div>
                        <td><select id="Type" class="autoInput" data-name="Type" type="text" title="Type"></select></td>
                        <td><select id="status" class="autoInput" data-name="Status" type="text" title="Status"></select></td>
                        <td><select id="NovelStatus" class="autoInput" data-name="NovelStatus" type="text" title="NovelStatus"></select></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="table-1-container">
            <table class="table-1">
                <tr class="table-1-tags-container">
                    <th class="HEADER tags-header">Tags</th>
                    <td class="tags-container">
                        <div class="autocomplete-wrapper">
                            <input id="tags" class="autoInput" data-name="Tag" type="text" placeholder="add tag..." />
                            <span class="autocomplete-ghost" aria-hidden="true"></span>
                        </div>
                        <div id="tag-pill-container"></div>
                    </td>
                </tr>
                <tr>
                    <th class="HEADER notes-header">Notes</th>
                    <td><input id="notes" class="autoInput" data-name="Notes" type="text" placeholder="optional..." /></td>
                </tr>
            </table>
        </div>
    </section>
    <section class="footer">
        <div id="Btn-Parent">
            <button type="button" class="Btn" id="save">Save</button>
            <div class="RSSLinkState-container">
                <svg class="RSSLinkState-svg">
                    <g class="RSSLinkState-g">
                        <polygon points="0,-12 12,0 0,12 -12,0" class="RSSLinkState-polygon"><title class="RSSLinkState-title">this Item is not linked to a RSS feed</title></polygon>
                    </g>
                </svg>
                <h3 id="isNewHermidata"></h3>
            </div>
            <div class="versionContainer">Version: <span class="version">v0.18.4</span></div>
        </div>
    </section>
</section>
<section class="HDRSS">
    <div id="HDRSS-subscribe-container">
        <input id="title_HDRSS" class="HDRSS_Input" data-name="Title"  type="text" spellcheck="false" placeholder="Title" />
        <select id="Type_HDRSS" class="HDRSS_Input" data-name="Type"  type="text" title="Type" ></select>
        <button id="subscribeBtn" type="button" class="Btn" disabled>Subscribe to new RSS feed</button>
    </div>
    <section id="sort-RSS-entries"><!-- Dynamic load sort items--></section>
    <section id="RSS-Notification"><!-- Dynamic load items--></section>
    <section id="All-RSS-entries"><!-- Dynamic load items--></section>
    <footer>
        <button type="button" id="clear-notifications" class="Btn">Clear notifications</button>
        <button type="button" id="openFullPageRSS" class="fullpage-RSS-btn Btn">Open RSS page</button>
        <div id="RSS-latest-sync-div">RSS: <span id="lastSync">Never</span></div> 
        <button type="button" id="RSS-sync-Manual" class="Btn">Manual sync</button>
        <span id="version">v1.4.3</span>
    </footer>
</section>
<section class="promptSection">
    <label for="genericInput" class="genericLabel"></label>
    <input class="genericInput" type="text" placeholder="genericInput"></input>
    <button type="button" class="genericButton1 Btn" >Save</button>
    <button type="button" class="genericButton2 Btn" >Cancel</button>
</section>
    <div id="spreadsheetPrompt">
        <label for="sheetUrlInput">Enter Spreadsheet URL:</label>
        <input type="text" id="sheetUrlInput" />
        <button type="button" id="saveSheetUrlBtn" class="Btn">Save</button>
    </div>
    <script src="../scripts/popup/in/main.ts" type="module"></script>
</body>
</html>
